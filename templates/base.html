<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SecureAccess IAM{% endblock %}</title>

    <style>
        .chat-container{
    display:flex;
    height:75vh;
}

.sidebar{
    width:250px;
    background:#f5f5f5;
    overflow-y:auto;
    border-right:1px solid #ddd;
}

.contact{
    display:flex;
    align-items:center;
    gap:12px;
    padding:15px;
    text-decoration:none;
    color:black;
    border-bottom:1px solid #ddd;
    transition:.2s;
}

.contact:hover{
    background:#ececec;
}

.avatar{
    width:45px;
    height:45px;
    border-radius:50%;
    background:#25d366;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
}
.search-box{
    width:90%;
    margin:10px;
    padding:10px;
    border-radius:10px;
}

.contact:hover{
    background:#e9e9e9;
}
.contact.active{
    background:#dbeafe;
    border-left:4px solid #2563eb;
}

.dark .contact.active{
    background:#374151;
}

.contact.active strong{
    color:#2563eb;
}

.chat-area{
    flex:1;
    padding:20px;
}

.chat-box{
    height:60vh;
    overflow-y:auto;
}
.contact-info{
    overflow:hidden;
}

.preview{
    color:gray;
    display:block;
    width:150px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}
.avatar-img{
    width:45px;
    height:45px;
    border-radius:50%;
    object-fit:cover;
}
@media(max-width:768px){

.chat-container{
    flex-direction:column;
}

.sidebar{
    width:100%;
    max-height:200px;
}

.chat-box{
    height:50vh;
}
.contact.active{
    background:#dcf8c6;
}
}

        *{
            max-width:100%;
        }
        img{
            max-width:100%;
            height:auto;
            border-radius:10px;
        }
        .chat-box {
            width: 90%;
            height: 450px;
            overflow-y: auto;
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin: auto;
            box-shadow: 0 0 15px rgba(0, 0, 0, .15);
        }

        .sent{
            margin-left:auto;
            background:#dcf8c6;
        }

        .received{
            background:white;
        }

        .message {
            background: #dcf8c6;
            padding: 10px;
            border-radius: 12px;
            width: fit-content;
            max-width:80%;
            word-wrap:break-word;
            margin-bottom: 10px;
        }
        .message img,
        .message video{
            max-width:100%;
            height:auto;
            border-radius:10px;
        }

        textarea {
            width: 90%;
            max-width: 700px;
            box-sizing:border-box;
            height: 60px;
            margin-top: 15px;
            border-radius: 10px;
            padding: 10px;
        }

        button {
            margin-top: 10px;
            padding: 10px 20px;
            border: none;
            background: #25d366;
            color: white;
            border-radius: 10px;
            cursor: pointer;
        }
         video{
            max-width:100%;
            height:auto;
            border-radius:10px;
        }

        @media (max-width: 768px) {
            .nav-links{
                flex-direction:column;
                width:100%;
                align-items:flex-start;
            }
            textarea {
                width: 85%;
                height: 50px;
                padding: 8px;
                font-size: 16px;
            }

            button {
                width:100%;
                padding: 10px 15px;
                font-size: 14px;
            }
           
        }
        
        :root {
            --bg: #f3f4f6;
            --surface: #ffffff;
            --surface-soft: #f9fafb;
            --text: #111827;
            --muted: #6b7280;
            --border: #d1d5db;
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --danger: #dc2626;
            --success: #16a34a;
            --nav: #111827;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: Arial, Helvetica, sans-serif;
            line-height: 1.5;
        }

        a {
            color: var(--primary);
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .topbar {
            background: var(--nav);
            color: #ffffff;
            padding: 0 24px;
        }

        .topbar-inner {
            max-width: 1100px;
            margin: 0 auto;
            min-height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
        }

        .brand {
            color: #ffffff;
            font-size: 18px;
            font-weight: 700;
            white-space: nowrap;
        }

        .nav-links {
            row-gap:8px;
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .nav-links a {
            color: #e5e7eb;
            font-size: 14px;
            padding: 8px 10px;
            border-radius: 6px;
        }

        .nav-links a:hover {
            color: #ffffff;
            background: #1f2937;
            text-decoration: none;
        }

        .page {
            max-width: 1100px;
            margin: 32px auto;
            padding: 0 24px;
        }

        .panel {
            background: var(--surface);
            box-shadow:0 5px 15px rgba(0,0,0,.1);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 28px;
            overflow-x:auto;
        }

        h1,
        h2,
        h3 {
            margin-top: 0;
            line-height: 1.2;
        }

        h2 {
            font-size: 26px;
            margin-bottom: 20px;
        }

        h3 {
            font-size: 18px;
            margin-bottom: 14px;
        }

        p {
            margin-top: 0;
        }

        label {
            display: block;
            margin-top: 14px;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 14px;
        }

        input,
        select {
            width: 100%;
            min-height: 42px;
            padding: 9px 11px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: #ffffff;
            color: var(--text);
            font-size: 14px;
        }

        input:focus,
        select:focus {
            outline: 2px solid rgba(37, 99, 235, 0.25);
            border-color: var(--primary);
        }

        button,
        .button {
            display: inline-flex;
            max-width:100%;
            align-items: center;
            justify-content: center;
            min-height: 42px;
            padding: 9px 16px;
            margin-top: 18px;
            border: 0;
            border-radius: 6px;
            background: var(--primary);
            color: #ffffff;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
        }

        button:hover,
        .button:hover {
            background: var(--primary-dark);
            text-decoration: none;
        }

        .button.secondary {
            background: #374151;
        }

        .button.secondary:hover {
            background: #1f2937;
        }

        .message {
            padding: 12px 14px;
            border-radius: 6px;
            margin-bottom: 18px;
            font-size: 14px;
        }

        .success {
            background: #ecfdf5;
            color: var(--success);
            border: 1px solid #bbf7d0;
        }

        .error {
            background: #fef2f2;
            color: var(--danger);
            border: 1px solid #fecaca;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 14px;
            background: #ffffff;
            font-size: 14px;
        }

        th,
        td {
            padding: 12px;
            border: 1px solid var(--border);
            text-align: left;
            vertical-align: top;
        }

        th {
            background: var(--surface-soft);
            font-weight: 700;
        }

        .table-wrap {
            width: 100%;
            overflow-x: auto;
        }

        hr {
            border: 0;
            border-top: 1px solid var(--border);
            margin: 28px 0;
        }

        .muted {
            color: var(--muted);
        }

        .menu-toggle {
            display: none;
            font-size: 28px;
            color: white;
            cursor: pointer;
        }
        

        @media (max-width: 700px) {
            .menu-toggle {
                display: block;
            }

            .nav-links {
                display: none;
                width: 100%;
                flex-direction: column;
                align-items: flex-start;
                gap: 5px;
                margin-top: 10px;
            }

            .nav-links.active {
                display: flex;
            }
        }
        .topbar{
            position:sticky;
            top:0;
            z-index:1000;
            }
        button,
        a,
        .panel,
        .message{
            transition:.2s;
        }
        .dark{
            --bg:#111827;
            --surface:#1f2937;
            --text:#f9fafb;
            --border:#374151;
            --nav:#000;
        }
        .sent{
            margin-left:auto;
            background:#dcf8c6;
        }

        .received{
            background:white;
        }

        @media (max-width: 700px) {
            .chat-box {
                width: 100%;
                height: 60vh;
                padding: 10px;
            }

            .message {
                max-width: 90%;
                font-size: 14px;
            }

            textarea {
                font-size: 16px;
            }

            select {
                width: 100%;
            }

            img {
                max-width: 100%;
            }

            .topbar {
                padding: 0 16px;
            }

            .topbar-inner {
                align-items: flex-start;
                flex-direction: column;
                gap: 10px;
                padding: 16px 0;
            }

            .nav-links {
                justify-content: flex-start;
            }

            .page {
                margin: 20px auto;
                padding: 0 16px;
            }

            .panel {
                padding: 20px;
            }

            h2 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
<script>
function toggleMenu(){
    document.getElementById("navMenu").classList.toggle("active");
}
</script>

<script>
function toggleDarkMode(){
document.body.classList.toggle("dark");
}
</script>
    <header class="topbar">
        <div class="topbar-inner">
            <a class="brand" href="{{ url_for('home') }}">SecureAccess IAM</a>

            <div class="menu-toggle" onclick="toggleMenu()">
                ☰
            </div>

            <nav class="nav-links" id="navMenu">
                    <button onclick="toggleDarkMode()">🌙</button>
                {% if session.get("username") %}
                    <a href="{{ url_for('dashboard') }}">Dashboard</a>
                    <a href="{{ url_for('users') }}">Users</a>
                    <a href="{{ url_for('messages') }}">Messages</a>
                    <a href="{{ url_for('audit_logs') }}">Audit Logs</a>
                    <a href="{{ url_for('profile') }}">
                        Profile
                    </a>
                    <a href="{{ url_for('logout') }}">Logout</a>
                {% else %}
                    <a href="{{ url_for('login') }}">Login</a>
                    <a href="{{ url_for('register') }}">Create Account</a>
                {% endif %}
            </nav>
        </div>
    </header>

    <main class="page">
        <section class="panel">
            {% block content %}{% endblock %}
        </section>
    </main>
</body>
</html>
