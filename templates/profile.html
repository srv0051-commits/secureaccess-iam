{% extends "base.html" %}

{% block content %}

<h2>{{user.username}}</h2>

{% if user.profile_pic %}
<img
src="{{url_for('static',filename='uploads/'+user.profile_pic)}}"
style="width:150px;height:150px;border-radius:50%;">
{% endif %}

<p>{{user.bio}}</p>

<a class="button"
href="{{url_for('edit_profile')}}">
Edit Profile
</a>

{% endblock %}
